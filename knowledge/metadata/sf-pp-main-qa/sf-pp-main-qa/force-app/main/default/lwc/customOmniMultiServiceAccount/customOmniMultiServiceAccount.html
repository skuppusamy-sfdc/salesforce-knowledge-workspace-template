<template>
    <lightning-dual-listbox 
        name={name}  
        label={label}
        source-label="Available"
        selected-label="Selected"
        field-level-help={helpText}
        options={options}
        onchange={handleChange}
        value={selectedValues}  
        required={isRequired}
        size=4>
    </lightning-dual-listbox>
    <!-- Note the use of 'displayErrorState' to match the JS fix -->
    <p class="slds-text-color_error"
       if:true={displayErrorState}>Error: {inputPropertyMap.fieldName} is required.</p>
</template>
