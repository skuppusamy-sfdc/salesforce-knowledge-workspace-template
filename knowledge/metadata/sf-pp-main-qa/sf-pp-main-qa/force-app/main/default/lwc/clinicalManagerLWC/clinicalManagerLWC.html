<template>
    <lightning-card ><!-- icon-name="standard:account" -->
        <!-- Loading Spinner -->
        <template if:true={isLoading}>
            <div class="slds-align_absolute-center slds-m-vertical_large">
                <lightning-spinner alternative-text="Loading clinical data..." variant="brand"
                    size="medium"></lightning-spinner>
                <div class="slds-m-top_small slds-text-align_center">
                    <p class="slds-text-body_small slds-text-color_weak">Loading clinical data...</p>
                </div>
            </div>
        </template>

        <!-- Main Content -->
        <template if:false={isLoading}>
            <div class="slds-m-around_medium">
                <!-- Selection Summary -->
                <div class="slds-m-bottom_small">
                    <span class="slds-badge slds-theme_success">
                        {selectedRows.length}/{totalRecords} selected
                    </span>
                </div>

                <!-- Lightning Datatable -->

                <div>
                    <lightning-datatable data-id="datatable" key-field="id" data={data} columns={columns}
                        selected-rows={selectedRows} onrowselection={handleRowSelection}>
                    </lightning-datatable>
                </div>
            </div>

            <!-- Pagination Controls -->
            <div class="slds-align_absolute-center slds-p-around_small">
                <button
                    class="slds-button slds-button_icon slds-button_icon-border slds-button_icon-small slds-m-right_x-small"
                    onclick={previousHandler} disabled={isPreviousDisabled} title="Previous">
                    <lightning-icon icon-name="utility:chevronleft" size="x-small"></lightning-icon>
                    <span class="slds-assistive-text">Previous</span>
                </button>

                <span class="slds-badge slds-badge_lightest slds-m-horizontal_x-small">
                    Page {page} of {totalPages}
                </span>

                <button
                    class="slds-button slds-button_icon slds-button_icon-border slds-button_icon-small slds-m-left_x-small"
                    onclick={nextHandler} disabled={isNextDisabled} title="Next">
                    <lightning-icon icon-name="utility:chevronright" size="x-small"></lightning-icon>
                    <span class="slds-assistive-text">Next</span>
                </button>
            </div>

            <!-- Submit Controls (Agentforce Compatible) -->
            <div class="slds-align_absolute-center slds-p-around_medium">
                <lightning-button variant="brand" label="Submit" onclick={handleSubmitToAgentforce}
                    disabled={isSubmitDisabled} icon-name="utility:check" class="slds-m-horizontal_small">
                </lightning-button>
            </div>
        </template>
    </lightning-card>
</template>
